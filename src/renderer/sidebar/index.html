<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GTray</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <aside id="sidebar">
    <div id="accounts"></div>
    <button id="add" title="Add account (⌘N)">+</button>
  </aside>
  <header id="topbar">
    <span id="active-title"></span>
    <div id="topbar-actions">
      <button id="open-calendar" class="app-btn" title="Open Google Calendar">
        <img src="calendar.svg" alt="Google Calendar" />
      </button>
      <button id="open-meet" class="app-btn" title="Open Google Meet">
        <img src="meet.svg" alt="Google Meet" />
      </button>
      <button id="open-drive" class="app-btn" title="Open Google Drive">
        <img src="drive.svg" alt="Google Drive" />
      </button>
      <button id="donate">Support this app 🍺</button>
    </div>
  </header>
  <main id="empty-state">
    <div class="empty-card">
      <h1>GTray</h1>
      <p>Add your first Gmail account with the <strong>+</strong> button in the left bar.</p>
      <p class="hint">Each account keeps its own session: you sign in only once.</p>
    </div>
  </main>
  <script src="sidebar.js"></script>
</body>
</html>
