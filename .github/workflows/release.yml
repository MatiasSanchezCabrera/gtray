# Release: pushing a v* tag builds and publishes a GitHub Release with the
# macOS .dmg (signed and notarized if the Apple secrets exist) and an
# experimental unsigned Windows NSIS installer, plus checksums.
#
# The macOS build is the primary one: if the Windows job fails, the release
# is published anyway with the .dmg only.
#
# Secrets for signing/notarizing (Settings -> Secrets and variables -> Actions):
#   CSC_LINK                     "Developer ID Application" certificate (.p12) in base64
#   CSC_KEY_PASSWORD             password of the .p12
#   APPLE_ID                     Apple ID of the developer account
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID                Team ID (developer.apple.com -> Membership)

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: write # to dispatch the Pages deploy after committing version.json

jobs:
  build-mac:
    runs-on: macos-14 # arm64 runner: produces the .dmg for Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Package .dmg (signs and notarizes if secrets exist)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "Signing and notarizing"
            npx electron-builder --mac dmg --publish never -c.mac.notarize=true
          else
            echo "No certificates: unsigned build"
            # Absent secrets arrive as empty-but-defined vars; electron-builder
            # would treat CSC_LINK="" as a certificate path, so drop them.
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac dmg --publish never
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package NSIS installer (unsigned; SmartScreen will warn)
        run: npx electron-builder --win nsis --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/GTray-x64.exe
          if-no-files-found: error

  publish:
    needs: [build-mac, build-windows]
    # Publish as long as the macOS build succeeded; the experimental Windows
    # installer is best-effort and must never block a release
    if: ${{ !cancelled() && needs.build-mac.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Checksums
        run: |
          cd release
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ls release/*.exe >/dev/null 2>&1; then
            cat > notes.md <<'EOF'
          > **Windows build (experimental):** `GTray-x64.exe` is unsigned, so SmartScreen will warn ("Windows protected your PC" → More info → Run anyway). No unread badge on Windows yet; closing the window quits the app. The macOS build is the primary, fully supported one.
          EOF
          else
            echo "The Windows build failed for this tag; this release ships the macOS .dmg only." > notes.md
          fi
          gh release create "$GITHUB_REF_NAME" release/* \
            --title "GTray $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes

      # The in-app update check reads gtray.app/version.json; committing it to
      # main under landing/ triggers the Pages deploy that publishes it.
      - name: Publish version.json for the in-app update check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          printf '{ "version": "%s" }\n' "$VERSION" > landing/version.json
          git add landing/version.json
          git commit -m "Point version.json at $VERSION for the update check"
          git push origin main
          # Pushes made with GITHUB_TOKEN don't trigger other workflows
          # (anti-recursion), so the Pages deploy must be dispatched explicitly
          gh workflow run pages.yml --ref main
